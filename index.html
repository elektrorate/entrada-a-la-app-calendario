
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barro & Co. Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        :root {
            --bg-main: #FDF8F3; /* Fondo crema muy suave de la referencia */
            --surface: #FFFFFF;
            --border: #F1E9E2;
            --text-main: #312A2C; /* Texto oscuro cálido */
            --text-sec: #8A8481;
            --accent: #C17D5C; /* Terracota de la referencia */
            --dark: #312A2C;
            --radius-card: 40px;
            --shadow-soft: 0 4px 20px -5px rgba(49, 42, 44, 0.03);
        }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }
        .premium-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-soft);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .pill-card {
            background: #F4EEE8; /* Fondo sutil para las píldoras de actividad */
            border-radius: 999px;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }
        .pill-card:hover {
            background: #EDE4DB;
            transform: scale(1.01);
        }
        .circular-btn {
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        .circular-btn:active {
            transform: scale(0.96);
        }
        /* Custom Leaflet overrides */
        .leaflet-container {
            border-radius: var(--radius-card);
            filter: sepia(0.2) contrast(0.9) brightness(1.05);
        }
        .marker-pin {
            background: var(--accent) !important;
            border: 2px solid white !important;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #E0E0E0; border-radius: 10px; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        .eyebrow {
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-sec);
            font-size: 14px;
            display: block;
        }
        
        .accent-line {
            height: 2px;
            background-color: var(--accent);
            width: 32px;
        }

        .day-selector-active {
            background-color: var(--dark);
            color: white;
            box-shadow: 0 10px 20px -5px rgba(49, 42, 44, 0.3);
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "leaflet": "https://esm.sh/leaflet@^1.9.4",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
</body>
</html>
